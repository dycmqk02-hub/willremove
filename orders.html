<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 주문 내역 - 잔재미 굿즈샵</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-brand">잔재미 굿즈샵</a>
    <div id="nav-right" class="nav-right"></div>
  </nav>

  <div class="container">
    <h1 class="page-title">내 주문 내역</h1>
    <div id="orders"><div class="spinner"></div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script>
    async function loadOrders() {
      const session = await requireAuth();
      if (!session) return;

      const { data, error } = await window.supabase
        .from('orders')
        .select('*')
        .eq('user_id', session.user.id)
        .order('created_at', { ascending: false });

      const container = document.getElementById('orders');
      if (error) {
        container.innerHTML = '<p style="color:var(--danger)">오류: ' + error.message + '</p>';
        return;
      }
      if (!data?.length) {
        container.innerHTML = '<p style="color:var(--text-muted)">주문 내역이 없습니다.</p>';
        return;
      }

      container.innerHTML = `
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr>
              <th>상품</th><th>수량</th><th>금액</th><th>상태</th><th>주문일시</th>
            </tr></thead>
            <tbody>
              ${data.map(o => `
                <tr>
                  <td>
                    ${o.product_image
                      ? `<img src="${o.product_image}" style="width:40px;height:40px;border-radius:4px;object-fit:cover;vertical-align:middle;margin-right:8px">`
                      : ''}
                    ${o.product_name}
                  </td>
                  <td>${o.quantity}</td>
                  <td>${formatPrice(o.amount)}</td>
                  <td>${statusBadge(o.status)}</td>
                  <td>${formatDate(o.created_at)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    updateNav();
    loadOrders();
  </script>
</body>
</html>
